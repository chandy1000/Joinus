      body { background: #1a1a1a; color: #f0f0ee; }

<body>
  <div id="root"></div>
  <script type="text/babel">

    const SUPABASE_URL = "https://xqvfdzzatugwqxcdwjbm.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhxdmZkenphdHVnd3F4Y2R3amJtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3ODI0MjQsImV4cCI6MjA5NzM1ODQyNH0.qrUQV8HbFEGbXjaA0rXNiAN_hRuPa-RZfL3UUoxp3rA"; // 👈 paste your regenerated key here
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function saveSession(code, data) {
      await sb.from("sessions").upsert({ code, data });
    }
    async function loadSession(code) {
      const { data } = await sb.from("sessions").select("data").eq("code", code).single();
      return data?.data || null;
    }
    // ──────────────────────────────────────────────────────────────────

    const { useState, useEffect } = React;

    const T = {
      en: {
        appName: "揪Jo-in Us",
        tagline: "Find the best date that works for everyone — no more back-and-forth in the group chat.",
        createTitle: "Create a new event",
        createPlaceholder: "Event name (e.g. June Dinner)",
        createBtn: "Create & get link",
        or: "or",
        joinTitle: "Join with a code",
        joinPlaceholder: "Enter session code",
        joinBtn: "Join event",

        sessionCode: "SESSION CODE",
        shareDesc: "Share this code with your group so everyone can add their availability.",
        copyBtn: "Copy invite message",
        copied: "Copied!",
        addMyDates: "Add my availability",
        backBtn: "← Back",
        responded: (n) => `${n} ${n === 1 ? "person has" : "people have"} responded`,
        code: "Code",
        yourName: "Your name",
        namePlaceholder: "Enter your name",
        tapDates: "Tap dates you're available",
        selected: (n) => `${n} selected`,

        viewResults: "View current results",

        viewResultsBtn: "View results",

        noResponses: "No responses yet. Share the code to get started!",

        allAvail: "All available",
        mostAvail: "Most available",
        someAvail: "Some available",
        errName: "Please enter your name.",
        errDates: "Please select at least one date.",
        errEventName: "Please enter an event name.",
        errNotFound: "Session not found. Check the code and try again.",
        inviteMsg: (name, code) => `Join my event "${name}" on 揪Jo-in Us! 🗓️\nCode: ${code}\n👉 https://chandy1000.github.io/Joinus/?code=${code}`,
        guideTitle: "Welcome to 揪Jo-in Us! 👋",
        guideSubtitle: "No more back-and-forth in the group chat. Here's how it works:",
        guideSteps: [
          { icon: "🎉", title: "Host creates an event", desc: "Give your event a name and get a short session code." },
          { icon: "📲", title: "Share the code", desc: "Drop the code into your LINE or WhatsApp group — anyone can join." },
          { icon: "📅", title: "Everyone picks their dates", desc: "Friends tap the days they're free on the calendar." },
          { icon: "✅", title: "Find the best date", desc: "The app shows which date works for the most people." },
        ],
        guideBtn: "Let's go!",
        guideHint: "Tap ? anytime to see this again",
        copyCode: "Copy code",
        codeCopied: "Code copied!",
        myEvents: "Your events",
        hosted: "Hosted",
        joined: "Joined",
        removeEvent: "Remove",
      },
      zh: {
        appName: "揪Jo-in Us",
        tagline: "找出大家都有空的日子，不用再在群組裡一直問！",
        createTitle: "建立新活動",
        createPlaceholder: "活動名稱（例如：六月聚餐）",
        createBtn: "建立並取得邀請碼",
        or: "或",
        joinTitle: "輸入邀請碼加入",
        joinPlaceholder: "輸入邀請碼",
        joinBtn: "加入活動",
        joining: "查詢中...",
        sessionCode: "邀請碼",
        shareDesc: "把這組邀請碼分享給大家，請每個人填上自己有空的日期。",
        copyBtn: "複製邀請訊息",
        copied: "已複製！",
        addMyDates: "填寫我的可用日期",
        backBtn: "← 返回",
        responded: (n) => `已有 ${n} 人填寫`,
        code: "邀請碼",
        yourName: "你的名字",
        namePlaceholder: "輸入你的名字",
        tapDates: "點選你有空的日期",
        selected: (n) => `已選 ${n} 天`,
        submitBtn: "送出可用日期",
        viewResults: "查看目前結果",
        successTitle: "已儲存！",
        successMsg: (name) => `謝謝 ${name}！可以查看結果或把邀請碼分享給其他人。`,
        viewResultsBtn: "查看結果",
        addAnother: "新增其他人",
        heatmapTitle: "日曆熱度圖",
        topDates: "最佳日期",
        noResponses: "還沒有人填寫，快把邀請碼分享出去吧！",
        addAnotherResponse: "新增其他人的回覆",
        allAvail: "全員有空",
        mostAvail: "多數有空",
        someAvail: "部分有空",
        errName: "請輸入你的名字。",
        errDates: "請至少選擇一個日期。",
        errEventName: "請輸入活動名稱。",
        errNotFound: "找不到該活動，請確認邀請碼是否正確。",
        inviteMsg: (name, code) => `快來加入「${name}」！在 揪Jo-in Us 選出大家有空的日子 🗓️\n邀請碼：${code}\n👉 https://chandy1000.github.io/Joinus/?code=${code}`,
        guideTitle: "歡迎使用 揪Jo-in Us！👋",
        guideSubtitle: "不用再在群組裡一直問，幾個步驟就能找到大家都有空的日子：",
        guideSteps: [
          { icon: "🎉", title: "主揪建立活動", desc: "輸入活動名稱，取得專屬邀請碼。" },
          { icon: "📲", title: "分享邀請碼", desc: "把邀請碼貼到 LINE 或其他群組，大家都能加入。" },
          { icon: "📅", title: "每個人選擇有空的日期", desc: "在日曆上點選自己方便的日期。" },
          { icon: "✅", title: "找出最佳日期", desc: "系統自動統計，顯示最多人有空的日子。" },
        ],
        guideBtn: "開始揪！",
        guideHint: "隨時點 ? 重新查看說明",
        copyCode: "複製邀請碼",
        codeCopied: "已複製邀請碼！",
        myEvents: "我的活動",
        hosted: "主揪",
        joined: "已加入",
        removeEvent: "移除",
      }
    };

    const MONTHS_EN = ["January","February","March","April","May","June","July","August","September","October","November","December"];
    const MONTHS_ZH = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
    const DAYS_EN = ["Su","Mo","Tu","We","Th","Fr","Sa"];
    const DAYS_ZH = ["日","一","二","三","四","五","六"];

    function generateCode() { return Math.random().toString(36).substring(2, 8).toUpperCase(); }
    function getDaysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
    function getFirstDayOfMonth(y, m) { return new Date(y, m, 1).getDay(); }

    const isDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
    const c = {
      bg: isDark ? "#1a1a1a" : "#f9f9f7",
      surface: isDark ? "#2a2a2a" : "#ffffff",
      surfaceAlt: isDark ? "#222222" : "#f3f3f1",
      border: isDark ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.12)",
      borderMid: isDark ? "rgba(255,255,255,0.2)" : "rgba(0,0,0,0.2)",
      text: isDark ? "#f0f0ee" : "#1a1a1a",
      textMuted: isDark ? "#aaa" : "#666",
      textFaint: isDark ? "#666" : "#aaa",
    };

    function CalendarPicker({ year, month, selected, onToggle, highlightCounts, maxCount, lang }) {
      const daysInMonth = getDaysInMonth(year, month);
      const firstDay = getFirstDayOfMonth(year, month);
      const today = new Date();
      const days = lang === "zh" ? DAYS_ZH : DAYS_EN;
      const cells = [];
      for (let i = 0; i < firstDay; i++) cells.push(null);
      for (let d = 1; d <= daysInMonth; d++) cells.push(d);

      function getHeatBg(count) {
        if (!count) return "transparent";
        const r = count / Math.max(maxCount, 1);
        if (r === 1) return "#22c55e";
        if (r >= 0.6) return "#d4f0e0";
        if (r >= 0.3) return "#fef3cd";
        return "#fde8e8";
      }
      function getHeatText(count) {
        if (!count) return c.textFaint;
        const r = count / Math.max(maxCount, 1);
        if (r === 1) return "#fff";
        if (r >= 0.6) return "#276749";
        if (r >= 0.3) return "#856404";
        return "#842029";
      }

      return (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 2, marginBottom: 4 }}>
            {days.map(d => <div key={d} style={{ textAlign: "center", fontSize: 11, color: c.textFaint, padding: "4px 0", fontWeight: 500 }}>{d}</div>)}
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3 }}>
            {cells.map((day, i) => {
              if (!day) return <div key={`e${i}`} />;
              const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
              const isPast = new Date(year, month, day) < new Date(today.getFullYear(), today.getMonth(), today.getDate());
              const isSelected = selected.includes(dateStr);
              const count = highlightCounts?.[dateStr] || 0;
              const bg = highlightCounts ? getHeatBg(count) : (isSelected ? "#22c55e" : c.surfaceAlt);
              const textColor = highlightCounts ? getHeatText(count) : (isSelected ? "#fff" : isPast ? c.textFaint : c.text);
              return (
                <div key={dateStr} onClick={() => !isPast && !highlightCounts && onToggle?.(dateStr)}
                  style={{ textAlign: "center", padding: "7px 0", borderRadius: 6, fontSize: 13,
                    background: bg, color: textColor,
                    cursor: highlightCounts || isPast ? "default" : "pointer",
                    border: isSelected && !highlightCounts ? "1.5px solid #16a34a" : "1.5px solid transparent",
                    fontWeight: isSelected || count ? 500 : 400,
                    opacity: isPast && !highlightCounts ? 0.4 : 1 }}
                  title={count ? `${count} ${lang === "zh" ? "人有空" : count === 1 ? "person" : "people"}` : ""}>
                  {day}
                  {count > 0 && highlightCounts && <div style={{ fontSize: 9, lineHeight: 1, marginTop: 1, color: textColor }}>{count}</div>}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      const [lang, setLang] = useState("en");
      const t = T[lang];
      const months = lang === "zh" ? MONTHS_ZH : MONTHS_EN;
      const [showGuide, setShowGuide] = useState(true);

      const [view, setView] = useState("home");
      const [sessionCode, setSessionCode] = useState("");
      const [session, setSession] = useState(null);
      const [myName, setMyName] = useState("");
      const [joinCode, setJoinCode] = useState("");
      const [eventName, setEventName] = useState("");
      const [selectedDates, setSelectedDates] = useState([]);
      const [calYear, setCalYear] = useState(new Date().getFullYear());
      const [calMonth, setCalMonth] = useState(new Date().getMonth());
      const [submitted, setSubmitted] = useState(false);
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);
      const [copied, setCopied] = useState(false);
      const [codeCopied, setCodeCopied] = useState(false);
      const [myEvents, setMyEvents] = useState(() => {
        try { return JSON.parse(localStorage.getItem("mdf_my_events") || "[]"); } catch (e) { return []; }
      });

      function rememberEvent(code, name, role) {
        setMyEvents(prev => {
          const filtered = prev.filter(e => e.code !== code);
          const next = [{ code, name, role, at: Date.now() }, ...filtered].slice(0, 20);
          try { localStorage.setItem("mdf_my_events", JSON.stringify(next)); } catch (e) {}
          return next;
        });
      }
      function forgetEvent(code) {
        setMyEvents(prev => {
          const next = prev.filter(e => e.code !== code);
          try { localStorage.setItem("mdf_my_events", JSON.stringify(next)); } catch (e) {}
          return next;
        });
      }
      async function openMyEvent(code) {
        setLoading(true);
        const data = await loadSession(code);
        setLoading(false);
        if (!data) { setError(t.errNotFound); return; }
        setSession(data); setSessionCode(code); setView("respond"); setError("");
      }

      // Auto-open event when link contains ?code=XXXXXX
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const urlCode = params.get("code");
        if (urlCode) {
          const code = urlCode.trim().toUpperCase();
          setLoading(true);
          loadSession(code).then(data => {
            setLoading(false);
            if (data) {
              setSession(data);
              setSessionCode(code);
              setShowGuide(false);
              setView("respond");
            }
          });
        }
      }, []);

      function toggleDate(d) { setSelectedDates(prev => prev.includes(d) ? prev.filter(x => x !== d) : [...prev, d]); }
      function prevMonth() { if (calMonth === 0) { setCalYear(y => y-1); setCalMonth(11); } else setCalMonth(m => m-1); }
      function nextMonth() { if (calMonth === 11) { setCalYear(y => y+1); setCalMonth(0); } else setCalMonth(m => m+1); }

      async function createSession() {
        if (!eventName.trim()) { setError(t.errEventName); return; }
        const code = generateCode();
        const data = { name: eventName.trim(), responses: {}, createdAt: Date.now() };
        await saveSession(code, data);
        rememberEvent(code, data.name, "hosted");
        setSessionCode(code); setSession(data); setView("share");
      }

      async function joinSession() {
        if (!joinCode.trim()) { setError(t.errNotFound); return; }
        setLoading(true);
        const data = await loadSession(joinCode.trim().toUpperCase());
        setLoading(false);
        if (!data) { setError(t.errNotFound); return; }
        rememberEvent(joinCode.trim().toUpperCase(), data.name, "joined");
        setSession(data); setSessionCode(joinCode.trim().toUpperCase()); setView("respond"); setError("");
      }

      async function submitAvailability() {
        if (!myName.trim()) { setError(t.errName); return; }
        if (selectedDates.length === 0) { setError(t.errDates); return; }
        const updated = { ...session, responses: { ...session.responses, [myName.trim()]: selectedDates } };
        await saveSession(sessionCode, updated);
        setSession(updated); setSubmitted(true); setError("");
      }

      function getResults() {
        if (!session) return { counts: {}, sorted: [] };
        const counts = {};
        Object.values(session.responses).forEach(dates => dates.forEach(d => { counts[d] = (counts[d] || 0) + 1; }));
        const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
        return { counts, sorted };
      }

      const { counts, sorted } = getResults();
      const totalResponders = session ? Object.keys(session.responses).length : 0;
      const maxCount = sorted.length ? sorted[0][1] : 1;

      function formatDate(dateStr) {
        const [y, m, d] = dateStr.split("-").map(Number);
        const dt = new Date(y, m-1, d);
        if (lang === "zh") return dt.toLocaleDateString("zh-TW", { month: "long", day: "numeric", weekday: "short" });
        return dt.toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
      }

      function copyInvite() {
        navigator.clipboard.writeText(t.inviteMsg(session?.name, sessionCode));
        setCopied(true); setTimeout(() => setCopied(false), 2000);
      }

      function copyCodeOnly() {
        navigator.clipboard.writeText(sessionCode);
        setCodeCopied(true); setTimeout(() => setCodeCopied(false), 2000);
      }

      const card = { background: c.surface, border: `0.5px solid ${c.border}`, borderRadius: 14, padding: "1.25rem 1.5rem" };
      const btnPrimary = { background: c.text, color: c.bg, border: "none", borderRadius: 8, padding: "10px 24px", fontSize: 14, fontWeight: 500, cursor: "pointer", width: "100%" };
      const btnSecondary = { background: "transparent", border: `0.5px solid ${c.borderMid}`, borderRadius: 8, padding: "10px 24px", fontSize: 14, cursor: "pointer", width: "100%", color: c.text };
      const navBtn = { background: "none", border: "none", color: c.textMuted, cursor: "pointer", fontSize: 13, padding: "4px 0" };

      function LangToggle() {
        return (
          <div style={{ display: "flex", gap: 0, border: `0.5px solid ${c.borderMid}`, borderRadius: 8, overflow: "hidden", fontSize: 13 }}>
            {["en","zh"].map(l => (
              <button key={l} onClick={() => setLang(l)} style={{ padding: "5px 12px", border: "none", cursor: "pointer", fontWeight: lang === l ? 500 : 400, background: lang === l ? c.text : "transparent", color: lang === l ? c.bg : c.textMuted }}>
                {l === "en" ? "EN" : "中文"}
              </button>
            ))}
          </div>
        );
      }

      function GuideModal() {
        return (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.5)", zIndex: 100, display: "flex", alignItems: "center", justifyContent: "center", padding: "1rem" }}>
            <div style={{ background: c.surface, borderRadius: 16, padding: "1.5rem", maxWidth: 380, width: "100%", boxShadow: "0 8px 32px rgba(0,0,0,0.18)" }}>
              <h2 style={{ fontSize: 18, fontWeight: 600, marginBottom: 6, color: c.text }}>{t.guideTitle}</h2>
              <p style={{ fontSize: 13, color: c.textMuted, marginBottom: 20 }}>{t.guideSubtitle}</p>
              <div style={{ display: "flex", flexDirection: "column", gap: 14, marginBottom: 24 }}>
                {t.guideSteps.map((step, i) => (
                  <div key={i} style={{ display: "flex", gap: 12, alignItems: "flex-start" }}>
                    <div style={{ fontSize: 22, lineHeight: 1, marginTop: 2 }}>{step.icon}</div>
                    <div>
                      <p style={{ fontSize: 14, fontWeight: 500, marginBottom: 2, color: c.text }}>{step.title}</p>
                      <p style={{ fontSize: 13, color: c.textMuted }}>{step.desc}</p>
                    </div>
                  </div>
                ))}
              </div>
              <button style={btnPrimary} onClick={() => setShowGuide(false)}>{t.guideBtn}</button>
              <p style={{ fontSize: 11, color: c.textFaint, textAlign: "center", marginTop: 10 }}>{t.guideHint}</p>
            </div>
          </div>
        );
      }

      function MonthNav() {
        return (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
            <button onClick={prevMonth} style={{ ...navBtn, fontSize: 20, padding: "2px 8px" }}>‹</button>
            <span style={{ fontWeight: 500, fontSize: 15, color: c.text }}>{months[calMonth]} {calYear}</span>
            <button onClick={nextMonth} style={{ ...navBtn, fontSize: 20, padding: "2px 8px" }}>›</button>
          </div>
        );
      }

      const wrap = { maxWidth: 440, margin: "0 auto", padding: "1.5rem 1rem" };

      if (view === "home") return (
        <div style={wrap}>
          {showGuide && <GuideModal />}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <LangToggle />
            <button onClick={() => setShowGuide(true)} style={{ background: c.surfaceAlt, border: "none", borderRadius: "50%", width: 28, height: 28, fontSize: 13, cursor: "pointer", color: c.textMuted, fontWeight: 600 }}>?</button>
          </div>
          <h1 style={{ fontSize: 28, fontWeight: 600, marginBottom: 6, color: c.text }}>{t.appName}</h1>
          <p style={{ color: c.textMuted, fontSize: 14, marginBottom: 24 }}>{t.tagline}</p>
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={card}>
              <p style={{ fontWeight: 500, marginBottom: 8, fontSize: 15, color: c.text }}>{t.createTitle}</p>
              <input placeholder={t.createPlaceholder} value={eventName} onChange={e => { setEventName(e.target.value); setError(""); }} />
              {error && <p style={{ color: "#e03131", fontSize: 12, marginTop: 6 }}>{error}</p>}
              <button style={{ ...btnPrimary, marginTop: 12 }} onClick={createSession}>{t.createBtn}</button>
            </div>
            <div style={{ textAlign: "center", color: c.textFaint, fontSize: 13 }}>{t.or}</div>
            <div style={card}>
              <p style={{ fontWeight: 500, marginBottom: 8, fontSize: 15, color: c.text }}>{t.joinTitle}</p>
              <input placeholder={t.joinPlaceholder} value={joinCode} onChange={e => { setJoinCode(e.target.value.toUpperCase()); setError(""); }} maxLength={6} />
              {error && <p style={{ color: "#e03131", fontSize: 12, marginTop: 6 }}>{error}</p>}
              <button style={{ ...btnSecondary, marginTop: 12 }} onClick={joinSession} disabled={loading}>{loading ? t.joining : t.joinBtn}</button>
            </div>
          </div>
          {myEvents.length > 0 && (
            <div style={{ ...card, marginTop: 12 }}>
              <p style={{ fontWeight: 500, marginBottom: 10, fontSize: 15, color: c.text }}>{t.myEvents}</p>
              {myEvents.map((ev, i) => (
                <div key={ev.code} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: i < myEvents.length - 1 ? `0.5px solid ${c.border}` : "none" }}>
                  <div onClick={() => openMyEvent(ev.code)} style={{ flex: 1, cursor: "pointer" }}>
                    <p style={{ fontSize: 14, fontWeight: 500, color: c.text }}>{ev.name}</p>
                    <p style={{ fontSize: 11, color: c.textFaint }}>{ev.role === "hosted" ? t.hosted : t.joined} · {ev.code}</p>
                  </div>
                  <button onClick={() => forgetEvent(ev.code)} style={{ background: "none", border: "none", color: c.textFaint, fontSize: 11, cursor: "pointer" }}>{t.removeEvent}</button>
                </div>
              ))}
            </div>
          )}
        </div>
      );

      if (view === "share") return (
        <div style={wrap}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
            <LangToggle />
            <button onClick={() => setShowGuide(true)} style={{ background: c.surfaceAlt, border: "none", borderRadius: "50%", width: 28, height: 28, fontSize: 13, cursor: "pointer", color: c.textMuted, fontWeight: 600 }}>?</button>
          </div>
          {showGuide && <GuideModal />}
          <div style={card}>
            <p style={{ fontWeight: 500, fontSize: 15, marginBottom: 4, color: c.text }}>{session?.name}</p>
            <p style={{ fontSize: 13, color: c.textMuted, marginBottom: 16 }}>{t.shareDesc}</p>
            <div onClick={copyCodeOnly} style={{ background: c.surfaceAlt, borderRadius: 10, padding: 16, textAlign: "center", marginBottom: 12, cursor: "pointer" }}>
              <p style={{ fontSize: 11, color: c.textFaint, marginBottom: 4, letterSpacing: 1 }}>{t.sessionCode}</p>
              <p style={{ fontSize: 32, fontWeight: 600, letterSpacing: 6, color: c.text }}>{sessionCode}</p>
              <p style={{ fontSize: 12, color: codeCopied ? "#16a34a" : c.textFaint, marginTop: 6 }}>{codeCopied ? `✓ ${t.codeCopied}` : `📋 ${t.copyCode}`}</p>
            </div>
            <button style={{ ...btnPrimary, marginBottom: 10 }} onClick={copyInvite}>{copied ? t.copied : t.copyBtn}</button>
            <button style={btnSecondary} onClick={() => { setMyName(""); setSelectedDates([]); setView("respond"); }}>{t.addMyDates}</button>
          </div>
        </div>
      );

      if (view === "respond") return (
        <div style={wrap}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <button style={navBtn} onClick={() => { setView("home"); setError(""); setSubmitted(false); }}>{t.backBtn}</button>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <LangToggle />
              <button onClick={() => setShowGuide(true)} style={{ background: c.surfaceAlt, border: "none", borderRadius: "50%", width: 28, height: 28, fontSize: 13, cursor: "pointer", color: c.textMuted, fontWeight: 600 }}>?</button>
            </div>
          </div>
          {showGuide && <GuideModal />}
          <h2 style={{ fontSize: 18, fontWeight: 500, margin: "12px 0 2px", color: c.text }}>{session?.name}</h2>
          <p style={{ fontSize: 13, color: c.textMuted, marginBottom: 16 }}>{t.responded(totalResponders)} · {t.code}: <strong onClick={copyCodeOnly} style={{ cursor: "pointer", textDecoration: "underline dotted" }}>{sessionCode}</strong> {codeCopied && <span style={{ color: "#16a34a" }}>✓</span>}</p>
          {submitted ? (
            <div style={{ ...card, textAlign: "center" }}>
              <p style={{ fontSize: 28, marginBottom: 8 }}>✓</p>
              <p style={{ fontWeight: 500, marginBottom: 4, color: c.text }}>{t.successTitle}</p>
              <p style={{ fontSize: 13, color: c.textMuted, marginBottom: 16 }}>{t.successMsg(myName)}</p>
              <button style={{ ...btnPrimary, marginBottom: 10 }} onClick={() => setView("results")}>{t.viewResultsBtn}</button>
              <button style={btnSecondary} onClick={() => { setSubmitted(false); setMyName(""); setSelectedDates([]); }}>{t.addAnother}</button>
            </div>
          ) : (
            <div style={card}>
              <p style={{ fontWeight: 500, fontSize: 14, marginBottom: 8, color: c.text }}>{t.yourName}</p>
              <input style={{ marginBottom: 16 }} placeholder={t.namePlaceholder} value={myName} onChange={e => { setMyName(e.target.value); setError(""); }} />
              <p style={{ fontWeight: 500, fontSize: 14, marginBottom: 8, color: c.text }}>{t.tapDates} <span style={{ color: c.textMuted, fontWeight: 400 }}>({t.selected(selectedDates.length)})</span></p>
              <MonthNav />
              <CalendarPicker year={calYear} month={calMonth} selected={selectedDates} onToggle={toggleDate} lang={lang} />
              {error && <p style={{ color: "#e03131", fontSize: 12, marginTop: 10 }}>{error}</p>}
              <button style={{ ...btnPrimary, marginTop: 16 }} onClick={submitAvailability}>{t.submitBtn}</button>
              {totalResponders > 0 && <button style={{ ...btnSecondary, marginTop: 10 }} onClick={() => setView("results")}>{t.viewResults}</button>}
            </div>
          )}
        </div>
      );

      if (view === "results") return (
        <div style={wrap}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
            <button style={navBtn} onClick={() => setView("respond")}>{t.backBtn}</button>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <LangToggle />
              <button onClick={() => setShowGuide(true)} style={{ background: c.surfaceAlt, border: "none", borderRadius: "50%", width: 28, height: 28, fontSize: 13, cursor: "pointer", color: c.textMuted, fontWeight: 600 }}>?</button>
            </div>
          </div>
          {showGuide && <GuideModal />}
          <h2 style={{ fontSize: 18, fontWeight: 500, margin: "12px 0 2px", color: c.text }}>{session?.name}</h2>
          <p style={{ fontSize: 13, color: c.textMuted, marginBottom: 16 }}>{t.responded(totalResponders)} · {t.code}: <strong onClick={copyCodeOnly} style={{ cursor: "pointer", textDecoration: "underline dotted" }}>{sessionCode}</strong> {codeCopied && <span style={{ color: "#16a34a" }}>✓</span>}</p>
          <div style={{ ...card, marginBottom: 16 }}>
            <p style={{ fontWeight: 500, fontSize: 14, marginBottom: 12, color: c.text }}>{t.heatmapTitle}</p>
            <MonthNav />
            <CalendarPicker year={calYear} month={calMonth} selected={[]} highlightCounts={counts} maxCount={maxCount} lang={lang} />
            <div style={{ display: "flex", gap: 12, marginTop: 12, flexWrap: "wrap" }}>
              {[["#22c55e","#16a34a",t.allAvail],["#d4f0e0","#276749",t.mostAvail],["#fde8e8","#842029",t.someAvail]].map(([bg,col,label]) => (
                <div key={label} style={{ display: "flex", alignItems: "center", gap: 5, fontSize: 11, color: c.textMuted }}>
                  <div style={{ width: 12, height: 12, borderRadius: 3, background: bg, border: `1px solid ${col}` }} />
                  {label}
                </div>
              ))}
            </div>
          </div>
          {sorted.length > 0 ? (
            <div style={card}>
              <p style={{ fontWeight: 500, fontSize: 14, marginBottom: 12, color: c.text }}>{t.topDates}</p>
              {sorted.slice(0, 8).map(([date, cnt], i) => (
                <div key={date} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 0", borderBottom: i < Math.min(sorted.length,8)-1 ? `0.5px solid ${c.border}` : "none" }}>
                  <div style={{ width: 24, height: 24, borderRadius: 6, background: cnt === maxCount ? "#22c55e" : c.surfaceAlt, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 500, color: cnt === maxCount ? "#fff" : c.textMuted, flexShrink: 0 }}>{i+1}</div>
                  <div style={{ flex: 1 }}><span style={{ fontSize: 14, fontWeight: 500, color: c.text }}>{formatDate(date)}</span></div>
                  <div style={{ fontSize: 13, color: cnt === maxCount ? "#16a34a" : c.textMuted, fontWeight: cnt === maxCount ? 500 : 400 }}>{cnt}/{totalResponders} {cnt === totalResponders ? "✓" : ""}</div>
                </div>
              ))}
            </div>
          ) : (
            <div style={{ ...card, textAlign: "center", color: c.textMuted, fontSize: 14 }}>{t.noResponses}</div>
          )}
          <button style={{ ...btnSecondary, marginTop: 12 }} onClick={() => { setView("respond"); setSubmitted(false); setMyName(""); setSelectedDates([]); }}>{t.addAnotherResponse}</button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
